<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .quality-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .quality-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .quality-btn:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .quality-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .download-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .video-info {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .video-info.show {
            display: block;
        }

        .video-thumbnail {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .video-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            display: none;
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #c33;
        }

        .error.show {
            display: block;
        }

        .success {
            display: none;
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #3c3;
        }

        .success.show {
            display: block;
        }

        .format-options {
            margin-top: 20px;
        }

        .format-btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .format-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .disclaimer {
            margin-top: 30px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
            font-size: 12px;
            color: #856404;
            border-left: 4px solid #ffc107;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 YouTube Downloader</h1>
        <p class="subtitle">Download your favorite YouTube videos easily</p>

        <div class="input-group">
            <label for="videoUrl">YouTube Video URL</label>
            <input 
                type="text" 
                id="videoUrl" 
                placeholder="https://www.youtube.com/watch?v=..."
                autocomplete="off"
            >
        </div>

        <div class="input-group">
            <label>Select Quality</label>
            <div class="quality-selector">
                <button class="quality-btn active" data-quality="720">720p</button>
                <button class="quality-btn" data-quality="480">480p</button>
                <button class="quality-btn" data-quality="360">360p</button>
                <button class="quality-btn" data-quality="auto">Auto</button>
            </div>
        </div>

        <button class="download-btn" id="downloadBtn">
            Download Video
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing your request...</p>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <div class="video-info" id="videoInfo">
            <img class="video-thumbnail" id="thumbnail" src="" alt="Video thumbnail">
            <div class="video-title" id="videoTitle"></div>
            <div class="format-options" id="formatOptions"></div>
        </div>

        <div class="disclaimer">
            <strong>⚠️ Disclaimer:</strong> This tool is for educational purposes only. 
            Please respect copyright laws and YouTube's Terms of Service. Only download 
            videos you have permission to download.
        </div>
    </div>

    <script>
        // Get elements
        const videoUrlInput = document.getElementById('videoUrl');
        const downloadBtn = document.getElementById('downloadBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const success = document.getElementById('success');
        const videoInfo = document.getElementById('videoInfo');
        const qualityBtns = document.querySelectorAll('.quality-btn');

        let selectedQuality = '720';

        // Quality selector
        qualityBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                qualityBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedQuality = btn.dataset.quality;
            });
        });

        // Extract video ID from URL
        function getVideoId(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length === 11) ? match[7] : null;
        }

        // Show error message
        function showError(message) {
            error.textContent = message;
            error.classList.add('show');
            setTimeout(() => error.classList.remove('show'), 5000);
        }

        // Show success message
        function showSuccess(message) {
            success.textContent = message;
            success.classList.add('show');
            setTimeout(() => success.classList.remove('show'), 5000);
        }

        // Download button click handler
        downloadBtn.addEventListener('click', async () => {
            const url = videoUrlInput.value.trim();

            if (!url) {
                showError('Please enter a YouTube URL');
                return;
            }

            const videoId = getVideoId(url);
            if (!videoId) {
                showError('Invalid YouTube URL');
                return;
            }

            // Hide previous messages
            error.classList.remove('show');
            success.classList.remove('show');
            videoInfo.classList.remove('show');

            // Show loading
            loading.classList.add('show');
            downloadBtn.disabled = true;

            try {
                // Using a third-party API (you'll need to implement backend or use a service)
                // This is a demo using a hypothetical API structure
                
                // Method 1: Direct download link (this is a simplified example)
                const downloadUrl = `https://www.youtube.com/watch?v=${videoId}`;
                
                // For demonstration, we'll show video info
                // In a real implementation, you'd need a backend service
                await fetchVideoInfo(videoId);

            } catch (err) {
                showError('Failed to process video. Please try again.');
                console.error(err);
            } finally {
                loading.classList.remove('show');
                downloadBtn.disabled = false;
            }
        });

        // Fetch video information (demo function)
        async function fetchVideoInfo(videoId) {
            // This is a demo - in production, you'd call your backend API
            // For now, we'll use YouTube's oEmbed API to get basic info
            
            try {
                const response = await fetch(
                    `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`
                );
                
                if (!response.ok) throw new Error('Video not found');
                
                const data = await response.json();
                
                // Display video info
                document.getElementById('videoTitle').textContent = data.title;
                document.getElementById('thumbnail').src = data.thumbnail_url;
                
                // Create download options
                const formatOptions = document.getElementById('formatOptions');
                formatOptions.innerHTML = `
                    <p style="margin-bottom: 10px; color: #666;">
                        <strong>Note:</strong> Direct download requires a backend service. 
                        Click below to open in a new tab:
                    </p>
                    <a href="https://www.youtube.com/watch?v=${videoId}" 
                       target="_blank" 
                       class="format-btn">
                        Open Video
                    </a>
                    <a href="https://y2mate.com/youtube/${videoId}" 
                       target="_blank" 
                       class="format-btn">
                        Download via Y2Mate
                    </a>
                `;
                
                videoInfo.classList.add('show');
                showSuccess('Video found! See download options below.');
                
            } catch (err) {
                throw new Error('Could not fetch video information');
            }
        }

        // Handle Enter key
        videoUrlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                downloadBtn.click();
            }
        });
    </script>
</body>
</html>
